<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>최영현보드</title>
  <link rel="manifest" href="./manifest.json" />

  <!-- 파비콘 및 아이콘 (새로운 디자인) -->
  <link rel="icon" type="image/png" sizes="32x32" href="/PERSONAL-Dashboard/favicon.png" />
  <link rel="apple-touch-icon" href="/PERSONAL-Dashboard/apple-touch-icon.png" sizes="180x180" />

  <!-- PWA 메타 태그 -->
  <meta name="theme-color" content="#1a5c3a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="최영현보드" />
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    body {
      font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', sans-serif;
    }

    .font-serif {
      font-family: 'Noto Serif KR', serif;
      font-weight: 700;
    }

    /* Custom Scrollbar Styles - More Aggressive Specificity */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px !important;
    }

    .compact-scrollbar::-webkit-scrollbar,
    textarea.compact-scrollbar::-webkit-scrollbar {
      width: 3px !important;
    }

    .wide-scrollbar::-webkit-scrollbar {
      width: 9px !important;
    }

    .custom-scrollbar::-webkit-scrollbar-button,
    .compact-scrollbar::-webkit-scrollbar-button,
    textarea.compact-scrollbar::-webkit-scrollbar-button,
    .wide-scrollbar::-webkit-scrollbar-button {
      display: none !important;
      width: 0 !important;
      height: 0 !important;
    }

    .custom-scrollbar::-webkit-scrollbar-track,
    .wide-scrollbar::-webkit-scrollbar-track,
    .compact-scrollbar::-webkit-scrollbar-track,
    textarea.compact-scrollbar::-webkit-scrollbar-track {
      background: transparent !important;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb,
    .wide-scrollbar::-webkit-scrollbar-thumb {
      background: #94A3B8 !important;
      border-radius: 10px !important;
      border: none !important;
    }

    .compact-scrollbar::-webkit-scrollbar-thumb,
    textarea.compact-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.5) !important;
      border-radius: 10px !important;
      border: none !important;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover,
    .wide-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #64748B !important;
    }

    .compact-scrollbar::-webkit-scrollbar-thumb:hover,
    textarea.compact-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(100, 116, 139, 0.7) !important;
    }

    /* Standard scrollbar properties for modern browsers */
    .custom-scrollbar, .wide-scrollbar {
      scrollbar-width: thin !important;
      scrollbar-color: #94A3B8 transparent !important;
    }

    .compact-scrollbar, textarea.compact-scrollbar {
      scrollbar-width: thin !important;
      scrollbar-color: rgba(148, 163, 184, 0.5) transparent !important;
    }

    /* Tiptap Editor Styles */
    .ProseMirror {
      outline: none;
      min-height: 200px;
    }

    .ProseMirror p.is-editor-empty:first-child::before {
      content: attr(data-placeholder);
      float: left;
      color: #94a3b8;
      pointer-events: none;
      height: 0;
      font-style: italic;
    }

    .ProseMirror ul {
      list-style-type: disc;
      padding-left: 1.5rem;
    }

    .ProseMirror ol {
      list-style-type: decimal;
      padding-left: 1.5rem;
    }

    @keyframes highlight-pulse {
      0% { background-color: transparent; }
      20% { background-color: #fef08a; } /* yellow-200 */
      80% { background-color: #fef08a; }
      100% { background-color: transparent; }
    }

    .highlight-animate {
      animation: highlight-pulse 3s ease-in-out;
      border-radius: 4px;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>
</head>

<body class="bg-[#F8FAFC]">
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>

  <!-- Service Worker 등록 -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        // 현재 경로에 따라 서비스 워커 경로 결정 (GitHub Pages vs Firebase/Local)
        const isListPage = window.location.pathname.includes('/PERSONAL-Dashboard/');
        const swPath = isListPage ? '/PERSONAL-Dashboard/sw.js' : '/sw.js';
        const scope = isListPage ? '/PERSONAL-Dashboard/' : '/';

        console.log('[PWA] Service Worker 시도:', swPath, 'Scope:', scope);

        navigator.serviceWorker.register(swPath, { scope })
          .then((registration) => {
            console.log('[PWA] Service Worker 등록 완료:', registration.scope);
          }).catch((error) => {
            console.error('[PWA] Service Worker 등록 실패:', error);
            
            // 등록 실패 시 (특히 Workbox 관련 에러 해결을 위해) 기존 워커 해제 시도
            navigator.serviceWorker.getRegistrations().then(registrations => {
              for(let registration of registrations) {
                registration.unregister();
                console.log('[PWA] 기존 워커 해제됨');
              }
            });
          });
      });
    }
  </script>
</body>

</html>
