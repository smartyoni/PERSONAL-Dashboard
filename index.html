  <style>
    body {
      font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', sans-serif;
    }

    .font-serif {
      font-family: 'Nanum Myeongjo', serif;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }

    .wide-scrollbar::-webkit-scrollbar {
      width: 9px;
    }

    .custom-scrollbar::-webkit-scrollbar-track,
    .wide-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb,
    .wide-scrollbar::-webkit-scrollbar-thumb {
      background: #94A3B8;
      border-radius: 10px;
      transition: background 0.2s ease;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover,
    .wide-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #64748B;
    }

    /* Tiptap Editor Styles */
    .ProseMirror {
      outline: none;
      min-height: 200px;
    }

    .ProseMirror p.is-editor-empty:first-child::before {
      content: attr(data-placeholder);
      float: left;
      color: #94a3b8;
      pointer-events: none;
      height: 0;
      font-style: italic;
    }

    .ProseMirror ul {
      list-style-type: disc;
      padding-left: 1.5rem;
    }

    .ProseMirror ol {
      list-style-type: decimal;
      padding-left: 1.5rem;
    }
  </style>

      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/PERSONAL-Dashboard/sw.js', {
          scope: '/PERSONAL-Dashboard/'
